# Firmware-specific build configuration.
# Requires the ESP Rust toolchain: cargo install espup && espup install

[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
# `cargo run --release` chains three steps automatically:
#   1. Build  — compiles for xtensa-esp32s3-none-elf
#   2. Validate — converts the ELF to a flashable .bin via `espflash save-image`
#                 (verifies the bootloader + partition table structure is correct)
#   3. Boot   — starts the image in Espressif's qemu-system-xtensa fork
#
# Prerequisites:
#   cargo install espflash          (for image conversion)
#   See README §Emulation for QEMU installation instructions.
#
# Flash to real hardware instead:
#   espflash flash --monitor --partition-table partitions.csv \
#       target/xtensa-esp32s3-none-elf/release/firmware
#
# CI / validate-only (no QEMU needed):
#   SANDOS_VALIDATE_ONLY=1 cargo run --release
runner = "./scripts/run-qemu.sh"
rustflags = ["-C", "link-arg=-nostartfiles"]

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
