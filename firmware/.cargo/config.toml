# Firmware-specific build configuration.
# Requires the ESP Rust toolchain: cargo install espup && espup install

[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
# `cargo run` flashes the firmware to a connected ESP32-S3 and opens the
# serial monitor.  Make sure the board is plugged in via USB before running.
#
# Install espflash if you haven't already:
#   cargo install espflash
#
# To emulate in QEMU instead (requires Espressif QEMU fork):
#   SANDOS_VALIDATE_ONLY=0 ./scripts/run-qemu.sh <path-to-elf>
runner = "espflash flash --monitor --partition-table partitions.csv"
rustflags = ["-C", "link-arg=-nostartfiles"]

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
