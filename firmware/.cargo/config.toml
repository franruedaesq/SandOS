# Firmware-specific build configuration.
# Requires the ESP Rust toolchain: cargo install espup && espup install

[build]
target = "xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
# `cargo run --release` flashes and monitors a real ESP32-S3 board.
# Requires: `cargo install espflash`
runner = "espflash flash --flash-size 16mb --monitor --partition-table partitions.csv"
rustflags = ["-C", "link-arg=-nostartfiles"]

[unstable]
build-std = ["core", "compiler_builtins", "alloc"]
build-std-features = ["compiler-builtins-mem"]
